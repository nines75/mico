name: Check

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  check:
    name: ${{ matrix.task }}
    timeout-minutes: 30
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        task: ["build", "compile", "lint", "format:ci", "test:ci"]
    steps:
      - uses: nines75/composite-action/setup-pnpm@main
      - run: pnpm ${{ matrix.task }}
